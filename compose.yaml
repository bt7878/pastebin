services:
  app:
    build: .
    env_file: .env
    volumes:
      - public:/var/www/html/public

  db:
    image: postgres:18
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  web:
    image: nginx:1.29.7
    ports:
      - "8080:80"
    volumes:
      - public:/var/www/html/public
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

volumes:
  public:
  postgres_data:
